<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:flex;
            justify-content: center;
        }
        .box{
            margin: 30px;
        }
    </style>
</head>
<body>
    <div id="data"></div>
    <script>
        let objs=[
            {
                id:1,
                name:"Samsung",
                price:"$450",
                desc:"Most commonly used mobile",
                url:"https://picsum.photos/id/1/300/300",
            },
            {
                id:2,
                name:"Mac",
                price:"$700",
                desc:"Provides high Security",
                url:"https://picsum.photos/id/2/300/300",
            },
            {
                id:3,
                name:"Android",
                price:"$500",
                desc:"high maintainence",
                url:"https://picsum.photos/id/3/300/300",
            },
        ];
        let l=objs.length;
        let str="<div class='container'>";
        for(let i=0;i<l;i++){
            str=str+`<div class='box'><img src='${objs[i].url}'/><h3>${objs[i].name}</h3> ${objs[i].desc}<p></p>${objs[i].price}<br><button>Add to Cart</button></div>`
        }
        str=str+"</div>"
        data.innerHTML=str;

    </script>
</body>
</html>
