<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // var names=["sruthi","appu","riya"]
        // names.push("anju")
        // console.log(names)
        var names=[];
        function add(){
            let name=document.getElementById("name").value;
            names.push(name)
            let str=""
            names.map(v=>{
                str=str+v+"<br>"
            })
            data.innerHTML=str
        }
    </script>
</head>
<body>
    <h1>Data Entry Form</h1>
    <input type="text" id="name" placeholder="Enter names">
    <button onclick="add()">Add</button>
    <div id="data"></div>

</body>
</html>
